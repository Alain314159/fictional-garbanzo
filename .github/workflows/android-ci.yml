name: 🐷 Cerdita CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    name: 🛠️ Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout del código
      uses: actions/checkout@v4
      
    - name: 🟢 Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: 🔧 Dar permisos a Gradle
      run: chmod +x gradlew
      
    - name: 🏗️ Compilar proyecto (Debug)
      run: ./gradlew assembleDebug
      
    - name: 🧪 Ejecutar Tests Unitarios
      run: ./gradlew test
      
    - name: 📊 Generar Reporte de Tests
      run: ./gradlew jacocoTestReport
      
    - name: ✅ Verificar que compile sin errores
      run: ./gradlew build --continue
      
    - name: 📦 Subir APK de Debug (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: cerdita-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        
    - name: 📄 Subir Reporte de Tests (Artifact)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: app/build/reports/tests/testDebugUnitTest/
        
  lint:
    name: 🔍 Lint Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout del código
      uses: actions/checkout@v4
      
    - name: 🟢 Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: 🔧 Dar permisos a Gradle
      run: chmod +x gradlew
      
    - name: 🔍 Ejecutar Android Lint
      run: ./gradlew lint
      
    - name: 📄 Subir Reporte de Lint (Artifact)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: lint-results
        path: app/build/reports/lint-results-debug.html
        
  dependency-check:
    name: 🔒 Dependency Check
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout del código
      uses: actions/checkout@v4
      
    - name: 🟢 Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: 🔧 Dar permisos a Gradle
      run: chmod +x gradlew
      
    - name: 🔍 Verificar dependencias
      run: ./gradlew dependencies
      
    - name: ⚠️ Buscar dependencias desactualizadas
      run: ./gradlew dependencyUpdates -Drevision=release
